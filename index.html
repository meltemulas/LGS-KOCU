    // ===== STATE =====
    let state = {
      sayfa: 'ana',
      tamamlanan: {},
      quizDurum: null,
      dersKey: null,
    };

    // ===== RENDER =====
    function render() {
      const app = document.getElementById('app');
      if (!app) return;
      
      try {
        if (state.sayfa === 'ana') renderAna(app);
        else if (state.sayfa === 'ders') renderDers(app);
        else if (state.sayfa === 'quiz') renderQuiz(app);
      } catch (e) {
        console.error('Render error:', e);
        app.innerHTML = '<div class="alert alert-error">Hata oluştu. Sayfayı yenile.</div>';
      }
    }

    function renderAna(app) {
      const toplamKonu = Object.values(DERSLER).reduce((s, d) => s + d.konular.length, 0);
      const toplamTam = Object.values(state.tamamlanan).reduce((s, d) => s + Object.values(d).filter(Boolean).length, 0);
      const genelPct = Math.round((toplamTam / toplamKonu) * 100);
      const kalanGun = Math.ceil((new Date("2027-06-06") - new Date()) / (1000 * 60 * 60 * 24));

      let html = '<div class="header"><div class="badge">LGS 2027</div><h1>Eğitim Koçun</h1><p>Birlikte başaracaksın 💪</p></div><div class="content">';
      html += '<div class="alert alert-info">🔗 <strong>Ortak takip aktif</strong> — Kardeşinin işaretlediği konular gerçek zamanlı görünüyor!</div>';
      html += '<div class="section-title">📚 Dersler</div><div class="ders-grid">';
      
      Object.entries(DERSLER).forEach(([key, ders]) => {
        const t = state.tamamlanan[key] || {};
        const bitti = ders.konular.filter(k => t[k.id]).length;
        const pct = Math.round((bitti / ders.konular.length) * 100);
        html += `
          <div class="ders-card" style="border-left-color: ${ders.renk};" onclick="goDers('${key}')">
            <div class="ders-emoji">${ders.emoji}</div>
            <div class="ders-label">${ders.label}</div>
            <div class="ders-info">${bitti}/${ders.konular.length} konu</div>
            <div class="progress-bar"><div class="progress-bar-fill" style="background: ${ders.renk}; width: ${pct}%;"></div></div>
          </div>
        `;
      });
      
      html += '</div><div class="section-title">📅 Sayaç</div>';
      html += `<div class="card" style="background: linear-gradient(135deg, #fef3c7, #fde68a); border: 1px solid #fcd34d; text-align: center;">
        <div style="font-size: 13px; color: #92400e; font-weight: 600;">📅 LGS 2027'ye Kalan</div>
        <div style="font-size: 32px; font-weight: 900; color: #78350f; margin-top: 12px;">${kalanGun} gün</div>
        <div style="font-size: 11px; color: #92400e; margin-top: 8px;">6 Haziran 2027 Pazar</div>
      </div></div>`;
      
      app.innerHTML = html;
    }

    function renderDers(app) {
      const ders = DERSLER[state.dersKey];
      const t = state.tamamlanan[state.dersKey] || {};
      const bitti = ders.konular.filter(k => t[k.id]).length;
      const pct = Math.round((bitti / ders.konular.length) * 100);

      let html = `<div class="header" style="background: linear-gradient(135deg, ${ders.renk}, ${ders.renk}dd);">
        <button class="btn btn-back" onclick="goAna()">←</button>
        <h1>${ders.emoji} ${ders.label}</h1>
      </div><div class="content">`;
      html += `<button class="btn btn-primary" onclick="startQuiz('${state.dersKey}')">🎯 Seviye Sınavı (20 Soru)</button>`;
      html += '<div class="section-title">📋 Konular</div>';
      
      ders.konular.forEach(konu => {
        const tamam = !!t[konu.id];
        html += `
          <div class="konu-row" style="background: ${tamam ? ders.renk + '12' : '#fff'};" onclick="toggleKonu('${state.dersKey}', '${konu.id}')">
            <div class="konu-checkbox" style="border-color: ${tamam ? ders.renk : '#d1d5db'}; background: ${tamam ? ders.renk : '#fff'};">
              ${tamam ? '✓' : ''}
            </div>
            <div class="konu-label">${konu.ad}</div>
          </div>
        `;
      });
      
      html += '</div>';
      app.innerHTML = html;
    }

    function renderQuiz(app) {
      const q = state.quizDurum;
      const ders = DERSLER[q.dersKey];

      if (q.bitti) {
        const pct = Math.round((q.sonucPuan / 20) * 100);
        let html = `<div class="header" style="background: linear-gradient(135deg, ${ders.renk}, ${ders.renk}dd);">
          <button class="btn btn-back" onclick="goDers('${q.dersKey}')">←</button>
          <h1>Sınav Sonucu</h1>
        </div><div class="content"><div class="result-header">
          <div class="result-score">${pct >= 80 ? '🏆' : pct >= 60 ? '😊' : '💡'}</div>
          <div class="result-number" style="color: ${pct >= 60 ? '#10b981' : '#ef4444'};">${q.sonucPuan}/20</div>
          <div class="result-percent">%${pct}</div>
          <div class="result-message">${pct >= 80 ? 'Harika! Konuları iyi öğrenmişsin 🌟' : pct >= 60 ? 'İyi gidiyorsun! Biraz daha çalış 💪' : 'Daha fazla pratik yapmalısın 📚'}</div>
        </div><div class="section-title">Soru Analizi</div>`;
        
        q.sorular.forEach((soru, i) => {
          const dogru = q.cevaplar[i] === soru.d;
          html += `
            <div class="card card-dense" style="border-left: 4px solid ${dogru ? '#10b981' : '#ef4444'};">
              <div style="font-size: 13px; color: #1f2937; font-weight: 500;">${i + 1}. ${soru.soru}</div>
              <div style="font-size: 12px; color: ${dogru ? '#059669' : '#dc2626'}; margin-top: 6px;">
                ${dogru ? '✓ Doğru' : `✗ Yanlış — Doğru: ${soru.s[soru.d]}`}
              </div>
            </div>
          `;
        });
        
        html += `<button class="btn btn-primary" onclick="startQuiz('${q.dersKey}')">🔄 Tekrar</button>`;
        html += '<button class="btn btn-secondary" onclick="goAna()">🏠 Ana Sayfa</button></div>';
        app.innerHTML = html;
      } else {
        const soru = q.sorular[q.aktif];
        let html = `<div class="header" style="background: linear-gradient(135deg, ${ders.renk}, ${ders.renk}dd);">
          <button class="btn btn-back" onclick="goDers('${q.dersKey}')">←</button>
          <h1>${ders.emoji} ${ders.label}</h1>
          <div style="font-size: 13px; opacity: 0.8;">${q.aktif + 1}/20</div>
        </div><div class="content"><div class="progress-bar mb-2">
          <div class="progress-bar-fill" style="background: #fff; width: ${((q.aktif) / 20) * 100}%;"></div>
        </div><div class="quiz-container quiz-soru">
          <div class="quiz-soru-metin">${soru.soru}</div>
          ${soru.s.map((sec, i) => `
            <button class="secenek" onclick="answerQuiz(${i})">
              <span class="secenek-harf">${String.fromCharCode(65 + i)}</span>${sec}
            </button>
          `).join('')}
        </div></div>`;
        app.innerHTML = html;
      }
    }

    // ===== FUNCTIONS =====
    window.goAna = function() {
      state.sayfa = 'ana';
      render();
    };

    window.goDers = function(key) {
      state.sayfa = 'ders';
      state.dersKey = key;
      render();
    };

    window.toggleKonu = function(dersKey, konuId) {
      if (!state.tamamlanan[dersKey]) state.tamamlanan[dersKey] = {};
      state.tamamlanan[dersKey][konuId] = !state.tamamlanan[dersKey][konuId];
      if (db) db.ref('lgs27/tamamlanan').set(state.tamamlanan).catch(e => console.error('Firebase write error:', e));
      render();
    };

    window.startQuiz = function(dersKey) {
      const havuz = QUIZ_SORULARI[dersKey];
      if (!havuz || havuz.length === 0) return;
      const kolay = havuz.filter(s => s.zorluk === 1).sort(() => Math.random() - 0.5);
      const orta = havuz.filter(s => s.zorluk === 2).sort(() => Math.random() - 0.5);
      const zor = havuz.filter(s => s.zorluk === 3).sort(() => Math.random() - 0.5);
      const secilen = [...kolay.slice(0, 7), ...orta.slice(0, 7), ...zor.slice(0, 6)];
      const eksik = 20 - secilen.length;
      if (eksik > 0) {
        const mevcut = new Set(secilen);
        havuz.filter(s => !mevcut.has(s)).sort(() => Math.random() - 0.5).slice(0, eksik).forEach(s => secilen.push(s));
      }
      state.quizDurum = { dersKey, sorular: secilen, cevaplar: [], aktif: 0, bitti: false, sonucPuan: 0 };
      state.sayfa = 'quiz';
      render();
    };

    window.answerQuiz = function(idx) {
      const q = state.quizDurum;
      if (!q || q.bitti) return;
      q.cevaplar.push(idx);
      if (q.aktif + 1 >= q.sorular.length) {
        const dogru = q.cevaplar.filter((c, i) => c === q.sorular[i].d).length;
        q.sonucPuan = dogru;
        q.bitti = true;
        if (db) {
          db.ref('lgs27/quizSonuclari').transaction(val => {
            const arr = Array.isArray(val) ? val : [];
            return [{ dersKey: q.dersKey, tarih: new Date().toLocaleDateString('tr-TR'), puan: dogru, toplam: 20 }, ...arr].slice(0, 30);
          }).catch(e => console.error('Firebase write error:', e));
        }
      } else {
        q.aktif++;
      }
      render();
    };

    // ===== FIREBASE LISTENERS =====
    if (db) {
      db.ref('lgs27/tamamlanan').on('value', snapshot => {
        state.tamamlanan = snapshot.val() || {};
        render();
      }, error => {
        console.error('Firebase read error:', error);
      });
    }

    // İlk render
    render();
  </script>
